name: DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Backend
      run: |
        docker build -t backend ./backend
        docker tag backend:latest ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}
        docker push ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}

    - name: Build Frontend
      run: |
        docker build -t frontend ./frontend
        docker tag frontend:latest ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}
        docker push ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Apply
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve

    - name: Deploy to EC2
      run: |
        echo "${{ secrets.EC2_KEY }}" > key.pem
        chmod 400 key.pem

        EC2_IP=$(aws ec2 describe-instances \
          --filters "Name=tag:Name,Values=DevOps-App-Server" \
          --query "Reservations[*].Instances[*].PublicIpAddress" \
          --output text)

        ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@$EC2_IP << EOF
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin $(echo ${{ secrets.ECR_BACKEND_REPO }} | cut -d'/' -f1)

          docker pull ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}
          docker pull ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}

          docker stop backend || true
          docker stop frontend || true
          docker rm backend || true
          docker rm frontend || true

          docker run -d -p 8000:8000 --name backend ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}
          docker run -d -p 80:80 --name frontend ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}
        EOF



        