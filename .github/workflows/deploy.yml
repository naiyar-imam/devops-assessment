name: DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}


    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2


    - name: Build Backend
      run: |
        docker build -t backend ./backend
        docker tag backend:latest ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}
        docker push ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}


    - name: Build Frontend
      run: |
        docker build -t frontend ./frontend
        docker tag frontend:latest ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}
        docker push ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}


    - name: Get EC2 IP
      run: |
        EC2_IP=$(aws ec2 describe-instances \
        --filters "Name=tag:Name,Values=DevOps-App-Server" \
        --query "Reservations[].Instances[].PublicIpAddress" \
        --output text | awk '{print $1}')

        echo "EC2_IP=$EC2_IP" >> $GITHUB_ENV


    - name: Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.EC2_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |

          sudo apt update -y
          sudo apt install -y docker.io awscli

          sudo systemctl start docker
          sudo systemctl enable docker

          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | sudo docker login --username AWS --password-stdin $(echo ${{ secrets.ECR_BACKEND_REPO }} | cut -d'/' -f1)

          sudo docker pull ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}
          sudo docker pull ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}

          sudo docker stop backend || true
          sudo docker stop frontend || true

          sudo docker rm backend || true
          sudo docker rm frontend || true

          sudo docker run -d -p 8000:8000 --name backend ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}
          sudo docker run -d -p 80:80 --name frontend ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}