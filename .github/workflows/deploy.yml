name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: |
        cd terraform
        terraform init

    - name: Terraform Apply
      run: |
        cd terraform
        terraform apply -auto-approve

    - name: Get EC2 Public IP
      run: |
        cd terraform
        echo "EC2_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_ENV

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Backend Docker Image
      run: |
        docker build -t backend ./backend
        docker tag backend:latest ${{ steps.login-ecr.outputs.registry }}/devops-backend:${{ github.sha }}
        docker push ${{ steps.login-ecr.outputs.registry }}/devops-backend:${{ github.sha }}

    - name: Build Frontend Docker Image
      run: |
        docker build -t frontend ./frontend
        docker tag frontend:latest ${{ steps.login-ecr.outputs.registry }}/devops-frontend:${{ github.sha }}
        docker push ${{ steps.login-ecr.outputs.registry }}/devops-frontend:${{ github.sha }}

    - name: Deploy Application on EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ env.EC2_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |

          echo "Updating packages..."
          sudo apt-get update -y

          echo "Installing Docker and AWS CLI..."
          sudo apt-get install -y docker.io awscli

          echo "Starting Docker..."
          sudo systemctl start docker
          sudo systemctl enable docker
          sudo usermod -aG docker ubuntu

          echo "Login to ECR..."
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

          echo "Stopping old containers if running..."
          sudo docker stop backend || true
          sudo docker stop frontend || true

          sudo docker rm backend || true
          sudo docker rm frontend || true

          echo "Pulling latest images..."
          sudo docker pull ${{ steps.login-ecr.outputs.registry }}/devops-backend:${{ github.sha }}
          sudo docker pull ${{ steps.login-ecr.outputs.registry }}/devops-frontend:${{ github.sha }}

          echo "Starting backend container..."
          sudo docker run -d --name backend -p 8000:8000 \
          ${{ steps.login-ecr.outputs.registry }}/devops-backend:${{ github.sha }}

          echo "Starting frontend container..."
          sudo docker run -d --name frontend -p 80:80 \
          ${{ steps.login-ecr.outputs.registry }}/devops-frontend:${{ github.sha }}

          echo "Deployment completed successfully."