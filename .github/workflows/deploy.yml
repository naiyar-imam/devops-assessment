name: DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    # Configure AWS credentials
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}


    # Login to Amazon ECR
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2


    # Build Backend Image
    - name: Build Backend
      run: |
        docker build -t backend ./backend
        docker tag backend:latest ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}
        docker push ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}


    # Build Frontend Image
    - name: Build Frontend
      run: |
        docker build -t frontend ./frontend
        docker tag frontend:latest ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}
        docker push ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}


    # Setup Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3


    # Run Terraform
    - name: Terraform Apply
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve


    # Wait for EC2 startup
    - name: Wait for EC2 startup
      run: sleep 60


    # Get EC2 Public IP
    - name: Get EC2 IP
      run: |
        cd terraform
        EC2_IP=$(terraform output -raw public_ip)
        echo "EC2_IP=$EC2_IP" >> $GITHUB_ENV
        echo "EC2 IP is $EC2_IP"


    # Deploy containers to EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.EC2_IP }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        script: |

          # Update system
          sudo yum update -y

          # Install Docker
          sudo yum install -y docker

          # Start Docker
          sudo systemctl start docker
          sudo systemctl enable docker

          # Install AWS CLI
          sudo yum install -y aws-cli

          # Login to ECR
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | sudo docker login --username AWS --password-stdin $(echo ${{ secrets.ECR_BACKEND_REPO }} | cut -d'/' -f1)

          # Pull images
          sudo docker pull ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}
          sudo docker pull ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}

          # Stop old containers
          sudo docker stop backend || true
          sudo docker stop frontend || true

          sudo docker rm backend || true
          sudo docker rm frontend || true

          # Run new containers
          sudo docker run -d -p 8000:8000 --name backend ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}
          sudo docker run -d -p 80:80 --name frontend ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}