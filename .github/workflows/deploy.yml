name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v3
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: |
        cd terraform
        terraform init

    - name: Terraform Apply
      run: |
        cd terraform
        terraform apply -auto-approve

    - name: Get EC2 Public IP
      id: ec2
      run: |
        cd terraform
        echo "EC2_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_ENV

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Backend Image
      run: |
        docker build -t backend ./backend
        docker tag backend:latest ${{ steps.login-ecr.outputs.registry }}/devops-backend:${{ github.sha }}
        docker push ${{ steps.login-ecr.outputs.registry }}/devops-backend:${{ github.sha }}

    - name: Build Frontend Image
      run: |
        docker build -t frontend ./frontend
        docker tag frontend:latest ${{ steps.login-ecr.outputs.registry }}/devops-frontend:${{ github.sha }}
        docker push ${{ steps.login-ecr.outputs.registry }}/devops-frontend:${{ github.sha }}

    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ env.EC2_IP }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |

          sudo apt update
          sudo apt install docker.io -y
          sudo systemctl start docker

          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

          docker pull ${{ steps.login-ecr.outputs.registry }}/devops-backend:${{ github.sha }}
          docker pull ${{ steps.login-ecr.outputs.registry }}/devops-frontend:${{ github.sha }}

          docker run -d -p 8000:8000 ${{ steps.login-ecr.outputs.registry }}/devops-backend:${{ github.sha }}

          docker run -d -p 80:80 ${{ steps.login-ecr.outputs.registry }}/devops-frontend:${{ github.sha }}